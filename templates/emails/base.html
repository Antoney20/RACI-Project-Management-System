<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            border-radius: 6px;
        }

        .header {
            background-color: #27aae1;
            color: #ffffff;
            padding: 24px 20px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .content {
            padding: 32px 28px;
            text-align: left;
        }

        .content p {
            margin: 0 0 14px 0;
            color: #555;
            font-size: 15px;
        }

        .button-container {
            text-align: center;
            margin: 28px 0;
        }

        .footer {
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 13px;
            color: #888;
        }

        a {
            color: #27aae1;
            text-decoration: none;
        }

        @media only screen and (max-width: 600px) {
            .content {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
        <td align="center" style="padding:20px;">

            <table width="600" cellpadding="0" cellspacing="0" class="container">
                <tr>
                    <td class="header">
                        <h2>{% block header_title %}RACI Notification{% endblock %}</h2>
                    </td>
                </tr>

                <tr>
                    <td class="content">

                        <p>Hello <strong>{{ user_name }}</strong>,</p>

                        {% block content %}
                        <p>{{ message }}</p>
                        {% endblock %}


                        <div class="footer">
                            <p>
                                If you have questions, contact us at
                                <a href="mailto:{{ support_email }}">{{ support_email }}</a>.
                            </p>
                            <p>
                                <strong>Best regards,</strong><br>
                                The RACI 
                            </p>
                            <p style="margin-top:12px; color:#aaa;">
                                © {{ current_year }} CEMA. All rights reserved.
                            </p>
                        </div>

                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
